# Source-of-truth labels for all golusoris repos. Synced via the
# reusable workflow at golusoris/.github/.github/workflows/sync-labels.yml.
# Format consumed by EndBug/label-sync@v2.

# Type ─────────────────────────────────────────
- name: "type:feat"
  color: "0e8a16"
  description: "New user-facing feature"
- name: "type:fix"
  color: "d73a4a"
  description: "Bug fix"
- name: "type:chore"
  color: "fef2c0"
  description: "Maintenance / cleanup"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation"
- name: "type:refactor"
  color: "c5def5"
  description: "Code refactor, no behavior change"
- name: "type:perf"
  color: "ff9a00"
  description: "Performance improvement"
- name: "type:test"
  color: "fbca04"
  description: "Test additions / fixes"
- name: "type:build"
  color: "5319e7"
  description: "Build system / tooling"
- name: "type:ci"
  color: "7057ff"
  description: "CI / workflows"

# Severity ─────────────────────────────────────
- name: "severity:p0"
  color: "b60205"
  description: "Critical — drop everything"
- name: "severity:p1"
  color: "d93f0b"
  description: "High priority"
- name: "severity:p2"
  color: "fbca04"
  description: "Normal priority"
- name: "severity:p3"
  color: "c2e0c6"
  description: "Low priority / nice-to-have"

# Status ───────────────────────────────────────
- name: "status:needs-triage"
  color: "ededed"
  description: "Awaiting initial review"
- name: "status:blocked"
  color: "e99695"
  description: "Blocked on something external"
- name: "status:in-progress"
  color: "1d76db"
  description: "Actively being worked on"
- name: "status:waiting-on-author"
  color: "fbca04"
  description: "Awaiting changes from PR author"
- name: "status:wontfix"
  color: "555555"
  description: "Will not be addressed"

# Special ──────────────────────────────────────
- name: "breaking-change"
  color: "b60205"
  description: "Includes a backwards-incompatible change"
- name: "good-first-issue"
  color: "7057ff"
  description: "Friendly entry point for new contributors"
- name: "help-wanted"
  color: "008672"
  description: "Maintainers welcome contributions"
- name: "security"
  color: "b60205"
  description: "Security-relevant change or issue"
- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update a dependency file"
